name: Deploy Backend

on:
  push:
    branches: [main]
    paths: [backend/**]

permissions:
  id-token: write
  contents: read

env:
  ECR_REPO: 248189947068.dkr.ecr.us-east-1.amazonaws.com/clube-xadrez-backend
  EKS_CLUSTER: dataiesb-cluster
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        run: |
          docker build -t $ECR_REPO:${{ github.sha }} -t $ECR_REPO:latest backend/
          docker push $ECR_REPO --all-tags

      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --name $EKS_CLUSTER --region $AWS_REGION
          kubectl set image deployment/clube-xadrez-backend app=$ECR_REPO:${{ github.sha }} -n clube-xadrez || \
            kubectl apply -f backend/k8s/ -n clube-xadrez
